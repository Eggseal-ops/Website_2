<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Game - The Vault</title>
    <link rel="icon" type="image/svg+xml" href="images/vault.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@ruffle-rs/ruffle@0.2.0-nightly.2025.10.2/ruffle.min.js"></script>
    <style>
        .play-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .play-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 0.6rem 1.2rem;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: var(--glass-hover);
            border-color: rgba(255, 51, 102, 0.5);
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .control-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: var(--glass-hover);
            border-color: rgba(255, 51, 102, 0.5);
            transform: translateY(-2px);
        }

        .game-controls {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        #game-title {
            font-size: 2.5rem;
            margin: 0;
        }

        #game-container {
            width: 100%;
            height: 80vh;
            background: var(--bg-panel);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-soft);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #game-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Header Navigation -->
    <header class="glass-header">
        <div class="header-container" style="justify-content: center;">
            <a href="vault.html" style="text-decoration: none; color: inherit;">
                <div class="logo">
                    <img src="images/vault.svg" alt="Vault Icon" style="width: 32px; height: 32px; filter: drop-shadow(0 0 8px rgba(255, 51, 102, 0.4));">
                    The<span class="logo-accent">Vault</span>
                </div>
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="play-container">
        <div class="play-header">
            <a href="vault.html" class="back-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back to Games
            </a>
            <h1 id="game-title" class="text-gradient">Loading Game...</h1>
            <div class="game-controls">
                <button id="reloadBtn" class="control-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                    </svg>
                    Reload
                </button>
                <button id="fullscreenBtn" class="control-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
                    </svg>
                    Fullscreen
                </button>
            </div>
        </div>

        <div id="game-container">
            <div class="spinner"></div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="logo">
                <img src="images/vault.svg" alt="Vault Icon" style="width: 28px; height: 28px; filter: drop-shadow(0 0 8px rgba(255, 51, 102, 0.4)); margin-right: 8px;">
                The<span class="logo-accent">Vault</span>
            </div>
            <p>Your premium cloud gaming destination.</p>
            <p class="copyright">&copy; 2026 TheVault. All rights reserved.</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Apply saved theme
            const savedTheme = localStorage.getItem('vault_theme');
            if (savedTheme && savedTheme !== 'pink') {
                document.body.classList.add(`theme-${savedTheme}`);
            }

            const params = new URLSearchParams(window.location.search);
            const gameUrl = params.get('url');
            let gameTitle = params.get('title');
            
            if (!gameTitle) {
                gameTitle = "Game";
            }
            
            document.getElementById('game-title').textContent = gameTitle;
            document.title = gameTitle + ' - The Vault';
            
            const container = document.getElementById('game-container');
            
            if (gameUrl) {
                if (gameUrl.endsWith('.swf')) {
                    // Load using Ruffle
                    container.innerHTML = ''; // clear spinner
                    const ruffle = window.RufflePlayer?.newest() || window.RufflePlayer?.createPlayer();
                    if (ruffle) {
                        const player = ruffle.createPlayer();
                        player.style.width = "100%";
                        player.style.height = "100%";
                        container.appendChild(player);
                        player.load(gameUrl);
                    } else {
                        container.innerHTML = '<p style="color: var(--text-muted);">Ruffle failed to load.</p>';
                    }
                } else {
                    // Load using iframe
                    container.innerHTML = ''; // clear spinner
                    const iframe = document.createElement('iframe');
                    iframe.id = 'game-iframe';
                    iframe.allowFullscreen = true;
                    container.appendChild(iframe);
                    
                    // jsdelivr serves .html files as text/plain. We must fetch and write the HTML.
                    fetch(gameUrl + (gameUrl.includes('?') ? '&' : '?') + "t=" + Date.now())
                        .then(response => {
                            if (!response.ok) throw new Error('Network response was not ok');
                            return response.text();
                        })
                        .then(html => {
                            iframe.contentDocument.open();
                            iframe.contentDocument.write(html);
                            iframe.contentDocument.close();
                        })
                        .catch(err => {
                            console.error('Failed to fetch game HTML, falling back to src:', err);
                            iframe.src = gameUrl;
                        });
                }
            } else {
                container.innerHTML = '<p style="color: var(--text-muted);">No game URL provided.</p>';
            }
            document.getElementById('fullscreenBtn').addEventListener('click', () => {
                const container = document.getElementById('game-container');
                if (container.requestFullscreen) {
                    container.requestFullscreen();
                } else if (container.webkitRequestFullscreen) {
                    container.webkitRequestFullscreen();
                } else if (container.msRequestFullscreen) {
                    container.msRequestFullscreen();
                }
            });

            document.getElementById('reloadBtn').addEventListener('click', () => {
                location.reload();
            });
        });
    </script>
</body>
</html>
